<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Cup Racing Data</title>
    <meta name="description" content="Season stats, driver profiles, and head-to-head comparisons for the Cup Racing league." />
    <link rel="stylesheet" href="styles.css" />
    <meta name="theme-color" content="#1a1a2e" />
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="manifest" href="manifest.json" />
  </head>
  <body>
    <noscript>
      <div class="noscript-banner">
        Cup Racing Data needs JavaScript enabled to work.
      </div>
    </noscript>

    <div class="app">
      <header class="topbar">
        <div class="topbar__brand">Cup Racing Data</div>
        <nav class="topbar__nav" id="main-nav" role="tablist" aria-label="Main views">
          <button class="nav-tab is-active" type="button" data-tab="seasons" role="tab" aria-selected="true">Seasons</button>
          <button class="nav-tab" type="button" data-tab="drivers" role="tab" aria-selected="false">Drivers</button>
          <button class="nav-tab" type="button" data-tab="compare" role="tab" aria-selected="false">Compare</button>
          <button class="nav-tab" type="button" data-tab="teams" role="tab" aria-selected="false">Teams</button>
        </nav>
      </header>

      <main class="content">
        <!-- Loading state -->
        <div id="loading-state" class="loading-state">
          <div class="loading-spinner"></div>
          <p>Loading Cup Racing data...</p>
        </div>

        <!-- Seasons view: card grid + drill-down -->
        <section class="view" data-view="seasons">
          <div class="view-header" id="seasons-header">
            <h1 class="view-title">Seasons</h1>
            <div class="view-filters" id="seasons-filters"></div>
          </div>
          <div id="seasons-content"></div>
        </section>

        <!-- Drivers view: list + full-page profile -->
        <section class="view" data-view="drivers" hidden>
          <div class="view-header" id="drivers-header">
            <h1 class="view-title" id="drivers-title">Drivers</h1>
            <div class="view-filters" id="drivers-filters"></div>
          </div>
          <div id="drivers-content"></div>
        </section>

        <!-- Compare view: driver picker + comparison -->
        <section class="view" data-view="compare" hidden>
          <div class="view-header">
            <h1 class="view-title">Compare Drivers</h1>
            <div class="view-filters" id="compare-filters"></div>
          </div>
          <div id="compare-content"></div>
        </section>

        <!-- Teams view -->
        <section class="view" data-view="teams" hidden>
          <div class="view-header">
            <h1 class="view-title">Teams</h1>
            <div class="view-filters" id="teams-filters"></div>
          </div>
          <div id="teams-content"></div>
        </section>
      </main>
    </div>

    <script src="scripts/data.js"></script>
    <script src="scripts/views-season.js"></script>
    <script src="scripts/views-analysis.js"></script>
    <script src="scripts/views-teams.js"></script>
    <script src="app.js"></script>
  </body>
</html>
